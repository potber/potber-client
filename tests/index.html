<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>potber-client Tests</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    {{content-for "head"}} {{content-for "test-head"}}

    <link rel="stylesheet" href="/@embroider/virtual/vendor.css" />
    <link rel="stylesheet" href="/@embroider/virtual/app.css" />
    <link rel="stylesheet" href="/@embroider/virtual/test-support.css" />

    {{content-for "head-footer"}} {{content-for "test-head-footer"}}
  </head>
  <body>
    {{content-for "body"}} {{content-for "test-body"}}

    <div id="qunit"></div>
    <div id="qunit-fixture">
      <div id="ember-testing-container">
        <div id="ember-testing"></div>
      </div>
    </div>

    <script type="module">
      async function loadClassicScript(src) {
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.async = false;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.head.appendChild(script);
        });
      }

      await loadClassicScript('/testem.js');
      await loadClassicScript('/@embroider/virtual/vendor.js');
      await loadClassicScript('/@embroider/virtual/test-support.js');
    </script>

    <script type="module">
      import 'ember-testing';
      import { start } from './test-helper';
      import.meta.glob('./**/*.{js,ts,gjs,gts}', { eager: true });
      start();
    </script>

    {{content-for "body-footer"}} 
  </body>
</html>
