on:
  workflow_call:
    inputs:
      image_name:
        description: "The base image name without a tag."
        type: string
        required: true
      image_names:
        description: "The image names and tags."
        type: string
        required: true
      image_labels:
        description: "The OCI labels for the image."
        type: string
        required: false
      registry:
        description: "The registry to use. Defaults to 'ghcr.io'."
        default: ghcr.io
        type: string
      context:
        description: "The docker build context. Defaults to the repository root folder."
        default: "."
        type: string
      dockerfile:
        description: "Path to the Dockerfile. (default {context}/Dockerfile)"
        default: Dockerfile
        type: string

jobs:
  build_and_push_image:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            artifact_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_suffix: arm64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build and push
      id: build
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.context }}/${{ inputs.dockerfile }}
        labels: ${{ inputs.image_labels }}
        platforms: ${{ matrix.platform }}
        outputs: type=image,name=${{ inputs.image_name }},push-by-digest=true,name-canonical=true,push=true

    - name: Export digest
      shell: bash
      run: |
        mkdir -p /tmp/digests
        touch "/tmp/digests/${DIGEST#sha256:}"
      env:
        DIGEST: ${{ steps.build.outputs.digest }}

    - name: Upload digest
      uses: actions/upload-artifact@v4
      with:
        name: digests-${{ matrix.artifact_suffix }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  merge_manifest:
    name: Publish manifest
    runs-on: ubuntu-latest
    needs:
      - build_and_push_image
    permissions:
      contents: read
      packages: write
    steps:
    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: /tmp/digests
        pattern: digests-*
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Create and push manifest list
      shell: bash
      run: |
        tag_args=()
        while IFS= read -r tag; do
          if [ -n "$tag" ]; then
            tag_args+=("-t" "$tag")
          fi
        done <<< "$IMAGE_NAMES"

        source_refs=()
        for digest_file in /tmp/digests/*; do
          digest="$(basename "$digest_file")"
          source_refs+=("${IMAGE_NAME}@sha256:${digest}")
        done

        docker buildx imagetools create "${tag_args[@]}" "${source_refs[@]}"
      env:
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_NAMES: ${{ inputs.image_names }}

    - name: Inspect published images
      shell: bash
      run: |
        while IFS= read -r tag; do
          if [ -n "$tag" ]; then
            docker buildx imagetools inspect "$tag"
          fi
        done <<< "$IMAGE_NAMES"
      env:
        IMAGE_NAMES: ${{ inputs.image_names }}
