name: staging

on:
  workflow_dispatch:
  push:
    branches:
    - main

permissions:
  contents: read
  packages: write

jobs:
  lint:
    uses: ./.github/workflows/npm_lint.yml

  test:
    uses: ./.github/workflows/npm_test-coverage.yml

  release_image:
    needs:
    - lint
    - test
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/release_image.yml
