name: "potber"

services:
  client:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
    - ../..:/workspaces:cached

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Uncomment the next line to use a non-root user for all processes.
    # user: vscode

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)
    depends_on:
    - potber-api
    - potber-auth
    ports:
    - "4200:4200"

  potber-api:
    image: ghcr.io/potber/potber-api
    restart: unless-stopped
    ports:
    - "3000:3000"
    environment:
      - APP_PORT=3000
      - APP_CLIENT_URL=http://localhost:4200
      - APP_API_URL=http://localhost:3000
      - SWAGGER_TEST_THREAD_ID=219289
      - CORS_ALLOWED_ORIGINS=http://localhost:4200
      - AUTH_JWT_SECRET=imnotarealsecret

  potber-auth:
    image: ghcr.io/potber/potber-auth
    restart: unless-stopped
    ports:
    - "5173:5173"
    environment:
      - PORT=5173
      - ORIGIN=http://localhost:5173
      - VITE_API_URL=http://potber-api:3000
      - VITE_API_LOGIN_ENDPOINT=/auth/login
      - VITE_API_SESSION_ENDPOINT=/auth/session
