    title: Einstellungen
    category:
      appearance: Erscheinungsbild
      network: Daten & Netzwerk
      behavior: Verhalten
      blocklist: Blockliste
      advanced: Gefahrenzone ⚠
    theme:
      label: Thema
      info: Mit dem Thema kannst Du einstellen, wie potber bei Dir aussehen soll.
    sidebar:
      label: Sidebar
      info: Bestimme selbst, ob die Sidebar von der linken oder rechten Seite öffnen und in welcher Ecke der dazugehörige Button positioniert werden soll.
    font-size:
      label: Schriftgröße
      info: Stelle die Schriftgröße ein, die potber für Texte und Symbole verwenden soll. Alle Schriftgrößen orientieren sich an der Schriftgröße Deines Geräts, wobei Schriftgöße "Normal" der auf Deinem Gerät eingestellten Standardschriftgröße entspricht. Bitte beachte, dass die Anwendung für Schriftgröße "Normal" optimiert ist. Andere Schriftgrößen können zu unerwünschten Darstellungsproblemen führen.
    darken-read-posts:
      label: Gelesene Posts abdunkeln
      info: Stelle ein, ob beim Aufruf eines Lesezeichens bereits gelesene Posts abgedunkelt werden sollen. Der "Neue Posts"-Trenner wird in jedem Fall eingeblendet.
    hide-global-and-announcement-threads:
      label: Globale Threads & Ankündigungen
      info: Stelle ein, ob globale Threads und Ankündigungen in der Board-Ansicht angezeigt oder ausgeblendet werden sollen.
    go-to-bottom-of-thread-page:
      label: Nach Öffnen eines Threads
      info: Stelle ein, ob beim Navigieren zu einem Thread aus einem Board der Seitenanfang oder das Seitenende der letzten Threadseite gezeigt werden soll.
    avatar-style:
      label: Bender anzeigen
      info: Stelle ein, ob in den Kopfzeilen von Posts die Bender der Autor:innen angezeigt werden sollen.
    auto-refresh-sidebar:
      label: Automatischer Newsfeed-Refresh
      info: Stelle ein, ob potber Deinen Newsfeed beim Ausklappen der Sidebar, beim Navigieren durch Threads und in regelmäßigen Abständen aktualisieren soll. Wenn diese Einstellung deaktiviert ist, spiegelt der Newsfeed möglicherweise einen veralteten Zustand wieder.
    landing-page:
      label: Startseite
      info: Deine Startseite wird beim Neustart von potber aufgerufen. Außerdem kannst Du sie jederzeit über das 🏠-Icon in der Sidebar aufrufen.
    transitions:
      label: Seitenwechsel
      info: Stelle ein, ob Du dynamische oder statische Seitenwechsel bevorzugst. Dynamische Seitenwechsel führen zu einem responsiveren Verhalten, während statische Seitenwechsel ruhiger verlaufen und weniger ablenkend sind.
    replace-forum-urls:
      label: forum.mods.de-Links ersetzen
      info: Ist diese Option aktiviert, werden bestimmte Links zum Forum (Posts, Threads und Boards) automatisch durch die entsprechenden potber-Links ersetzt
    enable-gestures:
      label: Gestensteuerung
      info: 'Aktiviere Gestensteuerung für potber. "Nur Sidebar" aktiviert lediglich das Öffnen und Schließen der Sidebar via horizontale Wischgesten. "Alle" aktiviert außerdem noch Pull-to-Refresh in Boards und Threads. <br/><br/>⚠ Bitte beachte, dass die Gestensteuerung unter Umständen Konflikte mit der Gestensteuerung Deines Browsers oder Deines Geräts verursachen kann.'
    debug:
      label: Debug-Modus
      info: Wechsle in den Debug-Modus. Üblicherweise solltest Du diese Einstellung nicht aktivieren.
    appsignal-error-reporting:
      label: Fehlerberichte senden
      info: Standardmäßig darf potber unerwartete Frontend-Fehler an AppSignal senden, damit Probleme besser nachvollziehbar werden und behoben werden können. Wenn Du das nicht möchtest, kannst Du diese Option deaktivieren. Änderungen werden erst nach einem Neuladen der App wirksam.
