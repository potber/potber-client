  blocklist:
    title: Blockliste
    description: Hier siehst Du, welche Nutzer:innen Du geblockt hast. Posts und Zitate von geblockten Nutzer:innen sind beim Laden einer Threadseite zu Beginn nicht lesbar und müssen manuell von Dir eingeblendet werden. Du kannst Nutzer:innen über das Kebab-Menü innerhalb eines Posts blocken. ⚠ Bitte beachte, dass Zitate über den Namen und nicht über die ID der Nutzer:in zugeordnet werden. Blockierte Nutzer:innen, deren Name sich geändert hat, müssen erneut der Blockliste hinzugefügt werden, damit das Blockieren von Zitaten wieder funktioniert.
